name: "AgentSpec Evaluation"

on:
    pull_request:
        paths:
            - "examples/**/*.yaml"
            - "examples/**/*.yml"

jobs:
    evaluate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Run AgentSpec eval
              uses: ./.github/actions/eval-spec
              with:
                  spec-path: "examples/"
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  api-key: ${{ secrets.DEEPSEEK_API_KEY }}
                  model: "deepseek-v4-pro"
